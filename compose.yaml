name: qr-exercise-prototype

services:
  quickdrop:
    image: dockerproxy.net/roastslav/quickdrop:v1.5.3@sha256:f47e2bd7ec0fc5f3dc984f17f83fc7fd4361093bff0f15b4357553ed16bf159b
    user: "1000:1000"
    restart: unless-stopped
    environment:
      TZ: ${TZ}
    ports:
      - "127.0.0.1:${QUICKDROP_PORT}:8080"
    volumes:
      - ./data/quickdrop/db:/app/db
      - ./data/quickdrop/files:/app/files
      - ./data/quickdrop/logs:/app/log
    networks:
      - qr-prototype-network
    cpus: "1.0"
    mem_limit: 1g
    pids_limit: 256
    init: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  pdf-worker:
    build:
      context: ./pdf-worker
      dockerfile: Dockerfile
      target: runtime
    image: qr-exercise-prototype-pdf-worker:local
    pull_policy: never
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      PDF_INPUT_DIR: /data/input
      PDF_OUTPUT_DIR: /data/output
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB}
      MAX_IMAGE_SIZE_MB: ${MAX_IMAGE_SIZE_MB:-30}
      MAX_IMAGE_PIXELS: ${MAX_IMAGE_PIXELS:-40000000}
      MAX_PDF_PAGES: ${MAX_PDF_PAGES}
      MAX_BINDING_VERSIONS: ${MAX_BINDING_VERSIONS}
      DEFAULT_QR_SIZE_MM: ${DEFAULT_QR_SIZE_MM}
      DEFAULT_QR_MARGIN_MM: ${DEFAULT_QR_MARGIN_MM}
      PDF_WORKER_DATABASE_PATH: ${PDF_WORKER_DATABASE_PATH}
      PDF_WORKER_STORAGE_ROOT: ${PDF_WORKER_STORAGE_ROOT}
      SITE_NAME: ${SITE_NAME:-练习册二维码管理系统}
      PUBLIC_QR_BASE_URL: ${PUBLIC_QR_BASE_URL:-http://127.0.0.1:18081}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      ADMIN_API_TOKEN_HASH: ${ADMIN_API_TOKEN_HASH:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SESSION_MAX_AGE_SECONDS: ${SESSION_MAX_AGE_SECONDS:-28800}
      ENABLE_ADMIN_API_DOCS: ${ENABLE_ADMIN_API_DOCS:-false}
      ALLOW_EXTERNAL_URLS: ${ALLOW_EXTERNAL_URLS:-false}
      ALLOW_PRIVATE_HTTP_EXTERNAL_URLS: ${ALLOW_PRIVATE_HTTP_EXTERNAL_URLS:-false}
      EXTERNAL_URL_REQUIRE_HTTPS: ${EXTERNAL_URL_REQUIRE_HTTPS:-true}
      EXTERNAL_URL_ALLOWED_HOSTS: ${EXTERNAL_URL_ALLOWED_HOSTS:-}
      EXTERNAL_URL_BLOCKED_HOSTS: ${EXTERNAL_URL_BLOCKED_HOSTS:-}
      PREVIEW_DPI: ${PREVIEW_DPI:-144}
      PREVIEW_WEBP_QUALITY: ${PREVIEW_WEBP_QUALITY:-82}
      PREVIEW_WEBP_METHOD: ${PREVIEW_WEBP_METHOD:-4}
      PREVIEW_MAX_PAGES: ${PREVIEW_MAX_PAGES:-500}
      PREVIEW_MAX_RENDER_WIDTH: ${PREVIEW_MAX_RENDER_WIDTH:-2000}
      PREVIEW_RENDER_VERSION: ${PREVIEW_RENDER_VERSION:-v1}
      PREVIEW_JOB_MAX_ATTEMPTS: ${PREVIEW_JOB_MAX_ATTEMPTS:-2}
      PREVIEW_JOB_STALE_SECONDS: ${PREVIEW_JOB_STALE_SECONDS:-900}
      PREVIEW_WORKER_POLL_SECONDS: ${PREVIEW_WORKER_POLL_SECONDS:-2}
      REQUIRE_PREVIEW_BEFORE_PUBLISH: ${REQUIRE_PREVIEW_BEFORE_PUBLISH:-true}
      PROTECTED_PREVIEW_EXTERNAL_URL_POLICY: ${PROTECTED_PREVIEW_EXTERNAL_URL_POLICY:-disable}
      VIEWER_SESSION_TTL_MINUTES: ${VIEWER_SESSION_TTL_MINUTES:-30}
      VIEWER_SESSION_IDLE_MINUTES: ${VIEWER_SESSION_IDLE_MINUTES:-10}
      VIEWER_COOKIE_SECURE: ${VIEWER_COOKIE_SECURE:-false}
      VIEWER_COOKIE_NAME: ${VIEWER_COOKIE_NAME:-viewer_session}
      VIEWER_SESSION_SECRET: ${VIEWER_SESSION_SECRET:-}
      VIEWER_SESSION_MAX_PAGE_REQUESTS: ${VIEWER_SESSION_MAX_PAGE_REQUESTS:-1000}
      VIEWER_STORE_NETWORK_FINGERPRINT: ${VIEWER_STORE_NETWORK_FINGERPRINT:-false}
      VIEWER_STORE_USER_AGENT_HASH: ${VIEWER_STORE_USER_AGENT_HASH:-true}
      VIEWER_ACCESS_EVENT_RETENTION_DAYS: ${VIEWER_ACCESS_EVENT_RETENTION_DAYS:-30}
      VIEWER_SESSION_RETENTION_DAYS: ${VIEWER_SESSION_RETENTION_DAYS:-7}
      AUDIT_EVENT_RETENTION_DAYS: ${AUDIT_EVENT_RETENTION_DAYS:-180}
      VIEWER_LOG_PAGE_EVENTS: ${VIEWER_LOG_PAGE_EVENTS:-true}
      VIEWER_PAGE_RATE_LIMIT_PER_MINUTE: ${VIEWER_PAGE_RATE_LIMIT_PER_MINUTE:-120}
      VIEWER_MANIFEST_RATE_LIMIT_PER_MINUTE: ${VIEWER_MANIFEST_RATE_LIMIT_PER_MINUTE:-30}
      VIEWER_MAX_CONCURRENT_PAGE_REQUESTS: ${VIEWER_MAX_CONCURRENT_PAGE_REQUESTS:-6}
      VIEWER_RATE_LIMIT_ENABLED: ${VIEWER_RATE_LIMIT_ENABLED:-true}
      WATERMARK_FONT_PATH: ${WATERMARK_FONT_PATH:-}
      WATERMARK_TEXT_TEMPLATE: ${WATERMARK_TEXT_TEMPLATE:-}
      WATERMARK_OPACITY: ${WATERMARK_OPACITY:-45}
      WATERMARK_ROTATION_DEGREES: ${WATERMARK_ROTATION_DEGREES:--25}
      WATERMARK_FONT_SIZE: ${WATERMARK_FONT_SIZE:-28}
      WATERMARK_SPACING_X: ${WATERMARK_SPACING_X:-420}
      WATERMARK_SPACING_Y: ${WATERMARK_SPACING_Y:-280}
    ports:
      - "${PDF_WORKER_BIND_ADDRESS:-127.0.0.1}:${PDF_WORKER_PORT}:8000"
    volumes:
      - ./data/pdf-worker/input:/data/input:ro
      - ./data/pdf-worker/output:/data/output
      - ./data/pdf-worker/db:/data/db
      - ./data/pdf-worker/storage:/data/storage
    networks:
      - qr-prototype-network
    cpus: "1.0"
    mem_limit: 512m
    pids_limit: 128
    init: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  preview-worker:
    build:
      context: ./pdf-worker
      dockerfile: Dockerfile
      target: runtime
    image: qr-exercise-prototype-pdf-worker:local
    pull_policy: never
    command: ["python", "-m", "app.preview_worker"]
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB}
      MAX_IMAGE_SIZE_MB: ${MAX_IMAGE_SIZE_MB:-30}
      MAX_IMAGE_PIXELS: ${MAX_IMAGE_PIXELS:-40000000}
      MAX_PDF_PAGES: ${MAX_PDF_PAGES}
      MAX_BINDING_VERSIONS: ${MAX_BINDING_VERSIONS}
      DEFAULT_QR_SIZE_MM: ${DEFAULT_QR_SIZE_MM}
      DEFAULT_QR_MARGIN_MM: ${DEFAULT_QR_MARGIN_MM}
      PDF_WORKER_DATABASE_PATH: ${PDF_WORKER_DATABASE_PATH}
      PDF_WORKER_STORAGE_ROOT: ${PDF_WORKER_STORAGE_ROOT}
      SITE_NAME: ${SITE_NAME:-练习册二维码管理系统}
      PUBLIC_QR_BASE_URL: ${PUBLIC_QR_BASE_URL:-http://127.0.0.1:18081}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      ADMIN_API_TOKEN_HASH: ${ADMIN_API_TOKEN_HASH:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SESSION_MAX_AGE_SECONDS: ${SESSION_MAX_AGE_SECONDS:-28800}
      ENABLE_ADMIN_API_DOCS: "false"
      ALLOW_EXTERNAL_URLS: ${ALLOW_EXTERNAL_URLS:-false}
      ALLOW_PRIVATE_HTTP_EXTERNAL_URLS: ${ALLOW_PRIVATE_HTTP_EXTERNAL_URLS:-false}
      EXTERNAL_URL_REQUIRE_HTTPS: ${EXTERNAL_URL_REQUIRE_HTTPS:-true}
      EXTERNAL_URL_ALLOWED_HOSTS: ${EXTERNAL_URL_ALLOWED_HOSTS:-}
      EXTERNAL_URL_BLOCKED_HOSTS: ${EXTERNAL_URL_BLOCKED_HOSTS:-}
      PREVIEW_DPI: ${PREVIEW_DPI:-144}
      PREVIEW_WEBP_QUALITY: ${PREVIEW_WEBP_QUALITY:-82}
      PREVIEW_WEBP_METHOD: ${PREVIEW_WEBP_METHOD:-4}
      PREVIEW_MAX_PAGES: ${PREVIEW_MAX_PAGES:-500}
      PREVIEW_MAX_RENDER_WIDTH: ${PREVIEW_MAX_RENDER_WIDTH:-2000}
      PREVIEW_RENDER_VERSION: ${PREVIEW_RENDER_VERSION:-v1}
      PREVIEW_JOB_MAX_ATTEMPTS: ${PREVIEW_JOB_MAX_ATTEMPTS:-2}
      PREVIEW_JOB_STALE_SECONDS: ${PREVIEW_JOB_STALE_SECONDS:-900}
      PREVIEW_WORKER_POLL_SECONDS: ${PREVIEW_WORKER_POLL_SECONDS:-2}
      REQUIRE_PREVIEW_BEFORE_PUBLISH: ${REQUIRE_PREVIEW_BEFORE_PUBLISH:-true}
      PROTECTED_PREVIEW_EXTERNAL_URL_POLICY: ${PROTECTED_PREVIEW_EXTERNAL_URL_POLICY:-disable}
      VIEWER_SESSION_SECRET: ${VIEWER_SESSION_SECRET:-}
    volumes:
      - ./data/pdf-worker/db:/data/db
      - ./data/pdf-worker/storage:/data/storage
    networks:
      - qr-prototype-network
    cpus: "1.0"
    mem_limit: 768m
    pids_limit: 64
    init: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  pdf-worker-tests:
    profiles: ["test"]
    build:
      context: ./pdf-worker
      dockerfile: Dockerfile
      target: test
    image: qr-exercise-prototype-pdf-worker-tests:local
    pull_policy: never
    environment:
      TZ: ${TZ}
      ADMIN_PASSWORD_HASH: scrypt:16384:8:1:AYldkMJ652oqEuLAL2sQ0Q:qx9DrnBxLwQA0As8F0aKqEBhjPjsvq8JeOyRNqgXw4s
      SESSION_SECRET: stage03-test-session-secret-at-least-32-characters
      VIEWER_SESSION_SECRET: stage05c-test-viewer-secret-at-least-32-bytes
    networks:
      - qr-prototype-network
    cpus: "1.0"
    mem_limit: 512m
    pids_limit: 128
    init: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

networks:
  qr-prototype-network:
    name: qr-prototype-network
    driver: bridge
