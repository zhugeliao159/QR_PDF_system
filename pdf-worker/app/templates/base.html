<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}{{ site_name }}{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/admin.css">
  <script defer src="/static/js/admin.js"></script>
</head>
<body>
  {% if admin %}
  <header class="topbar">
    <a class="brand" href="/admin">{{ site_name }}</a>
    <nav aria-label="主导航">
      <a href="/admin/materials/new">新建解析二维码</a>
      <a href="/admin/pdf/new">给练习册添加二维码</a>
      <a href="/admin/materials">管理已有资料</a>
    </nav>
    <form method="post" action="/admin/logout" class="logout-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <span>{{ admin.username }}</span><button class="text-button" type="submit">退出登录</button>
    </form>
  </header>
  {% endif %}
  <main class="page-shell {% if not admin %}guest-shell{% endif %}">
    {% if error %}<div class="notice danger" role="alert">{{ error }}</div>{% endif %}
    {% if success %}<div class="notice success" role="status">{{ success }}</div>{% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
