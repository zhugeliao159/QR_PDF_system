{% extends "base.html" %}{% block content %}<header class="page-heading"><div><p class="eyebrow">{{ material.display_code }}</p><h1>编辑资料信息</h1></div></header><form method="post" class="form-layout narrow" data-submit-lock><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><section class="form-section"><div class="form-grid"><label class="span-2">资料名称<input name="title" maxlength="100" value="{{ material.title }}" required></label><label>年级<select name="grade">{% for value in grades %}<option {% if material.grade == value %}selected{% endif %}>{{ value }}</option>{% endfor %}</select></label><label>学科<select name="subject">{% for value in subjects %}<option {% if material.subject == value %}selected{% endif %}>{{ value }}</option>{% endfor %}</select></label><label>教材版本或册次<input name="textbook_version" maxlength="100" value="{{ material.textbook_version or '' }}"></label><label>章节<input name="chapter" maxlength="200" value="{{ material.chapter or '' }}"></label><label class="span-2">备注<textarea name="note" maxlength="500">{{ material.note or '' }}</textarea></label></div></section><div class="form-actions"><a href="/admin/materials/{{ material.qr_id }}">取消</a><button class="primary">保存修改</button></div></form>{% endblock %}
