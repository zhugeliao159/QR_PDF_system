{% extends "base.html" %}{% block content %}<header class="page-heading"><div><p class="eyebrow">{{ material.display_code }}</p><h1>替换解析文件</h1></div></header><div class="notice warning">替换后，使用“自动更新到最新版”的二维码将打开新文件；使用“锁定当前版本”的二维码不会变化。</div><form method="post" enctype="multipart/form-data" class="form-layout narrow" data-submit-lock><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><section class="form-section"><label class="file-drop">选择新的解析文件<input type="file" name="file" required></label><label>更新说明<textarea name="note" maxlength="500" rows="3"></textarea></label></section><div class="form-actions"><a href="/admin/materials/{{ material.qr_id }}">取消</a><button class="primary" data-loading-text="正在替换……">确认替换</button></div></form>{% endblock %}
